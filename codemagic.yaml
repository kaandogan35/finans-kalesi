workflows:
  ios-release:
    name: ParamGo iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    cache:
      cache_paths:
        - node_modules
        - $HOME/.npm
        - frontend/ios/App/SourcePackages
        - $HOME/Library/Developer/Xcode/DerivedData/CompilationCache.noindex
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'master'
          include: true
      cancel_previous_builds: true
    environment:
      groups:
        - default
      vars:
        XCODE_PROJECT: "frontend/ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.paramgo.app"
      node: v22.13.0
      xcode: latest
    scripts:
      - name: Install frontend dependencies
        script: |
          cd frontend
          npm install

      - name: Build frontend (Vite)
        script: |
          cd frontend
          npm run build

      - name: Capacitor sync iOS
        script: |
          cd frontend
          npx cap add ios
          npx cap sync ios

      # Sign In with Apple entitlement — Apple Sign-In paketi Capacitor 8 uyumlu olunca geri eklenecek

      - name: Increment build number
        script: |
          cd frontend/ios/App
          agvtool new-version -all $PROJECT_BUILD_NUMBER
          echo "Build number set to: $PROJECT_BUILD_NUMBER"

      - name: Set up code signing
        script: |
          # 1. Keychain oluştur
          keychain initialize

          # 2. App Store Connect API ile sertifika ve profili indir/oluştur
          # CERTIFICATE_PRIVATE_KEY yoksa --create yeni sertifika oluşturur
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --platform IOS \
            --create

          # 3. Sertifikaları keychain'e ekle
          keychain add-certificates

          # 4. Xcode projesine imzalama ayarlarını uygula
          xcode-project use-profiles

          # 5. Doğrulama
          echo "=== Profiles (old path) ==="
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles/" 2>/dev/null || echo "Empty"
          echo "=== Profiles (new path) ==="
          ls -la "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles/" 2>/dev/null || echo "Empty"
          echo "=== Code Signing Identities ==="
          security find-identity -v -p codesigning

      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
