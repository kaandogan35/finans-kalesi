workflows:
  ios-release:
    name: ParamGo iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    cache:
      cache_paths:
        - node_modules
        - $HOME/.npm
        - frontend/ios/App/SourcePackages
        - $HOME/Library/Developer/Xcode/DerivedData/CompilationCache.noindex
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'master'
          include: true
      cancel_previous_builds: true
    environment:
      groups:
        - default
      vars:
        XCODE_PROJECT: "frontend/ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.paramgo.app"
      node: v22.13.0
      xcode: latest
    scripts:
      - name: Install frontend dependencies
        script: |
          cd frontend
          npm install

      - name: Build frontend (Vite)
        script: |
          cd frontend
          npm run build

      - name: Capacitor sync iOS
        script: |
          cd frontend
          npx cap add ios
          npx cap sync ios

      - name: Add Sign In with Apple entitlement
        script: |
          ENTITLEMENTS_FILE="frontend/ios/App/App/App.entitlements"

          cat > "$ENTITLEMENTS_FILE" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.developer.applesignin</key>
              <array>
                  <string>Default</string>
              </array>
          </dict>
          </plist>
          EOF

          PBXPROJ="frontend/ios/App/App.xcodeproj/project.pbxproj"
          sed -i '' 's/ASSETCATALOG_COMPILER_APPICON_NAME = AppIcon;/ASSETCATALOG_COMPILER_APPICON_NAME = AppIcon;\n\t\t\t\tCODE_SIGN_ENTITLEMENTS = App\/App.entitlements;/g' "$PBXPROJ"

          echo "Entitlements file:"
          cat "$ENTITLEMENTS_FILE"
          echo "CODE_SIGN_ENTITLEMENTS in project:"
          grep "CODE_SIGN_ENTITLEMENTS" "$PBXPROJ" || echo "WARNING: Not found!"

      - name: Increment build number
        script: |
          cd frontend/ios/App
          agvtool new-version -all $PROJECT_BUILD_NUMBER
          echo "Build number set to: $PROJECT_BUILD_NUMBER"

      - name: Set up code signing
        script: |
          # 1. Keychain oluştur
          keychain initialize

          # 2. App Store Connect API ile sertifika ve profili indir/oluştur
          # CERTIFICATE_PRIVATE_KEY yoksa --create yeni sertifika oluşturur
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --platform IOS \
            --create

          # 3. Sertifikaları keychain'e ekle
          keychain add-certificates

          # 4. Xcode projesine imzalama ayarlarını uygula
          xcode-project use-profiles

          # 5. Doğrulama
          echo "=== Profiles (old path) ==="
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles/" 2>/dev/null || echo "Empty"
          echo "=== Profiles (new path) ==="
          ls -la "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles/" 2>/dev/null || echo "Empty"
          echo "=== Code Signing Identities ==="
          security find-identity -v -p codesigning

      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
