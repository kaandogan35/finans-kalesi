workflows:
  ios-release:
    name: ParamGo iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    cache:
      cache_paths:
        - node_modules
        - $HOME/.npm
        - frontend/ios/App/SourcePackages
        - $HOME/Library/Developer/Xcode/DerivedData/CompilationCache.noindex
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
      cancel_previous_builds: true
    environment:
      groups:
        - default
      vars:
        XCODE_PROJECT: "frontend/ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.paramgo.app"
      node: v22.13.0
      xcode: latest
    scripts:
      - name: Install frontend dependencies
        script: |
          cd frontend
          npm install

      - name: Build frontend (Vite)
        script: |
          cd frontend
          npm run build

      - name: Capacitor sync iOS
        script: |
          cd frontend
          npx cap add ios
          npx cap sync ios

      - name: Add Sign In with Apple entitlement
        script: |
          ENTITLEMENTS_FILE="frontend/ios/App/App/App.entitlements"

          # Entitlements dosyasını oluştur
          cat > "$ENTITLEMENTS_FILE" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.developer.applesignin</key>
              <array>
                  <string>Default</string>
              </array>
          </dict>
          </plist>
          EOF

          # project.pbxproj'a CODE_SIGN_ENTITLEMENTS ekle (her iki config için)
          PBXPROJ="frontend/ios/App/App.xcodeproj/project.pbxproj"
          sed -i '' 's/ASSETCATALOG_COMPILER_APPICON_NAME = AppIcon;/ASSETCATALOG_COMPILER_APPICON_NAME = AppIcon;\n\t\t\t\tCODE_SIGN_ENTITLEMENTS = App\/App.entitlements;/g' "$PBXPROJ"

          echo "Entitlements added:"
          cat "$ENTITLEMENTS_FILE"
          grep "CODE_SIGN_ENTITLEMENTS" "$PBXPROJ"

      - name: Increment build number
        script: |
          cd frontend/ios/App
          agvtool new-version -all $PROJECT_BUILD_NUMBER
          echo "Build number set to: $PROJECT_BUILD_NUMBER"

      - name: Set up code signing
        script: |
          # 1. Keychain oluştur
          keychain initialize

          # 2. Sertifikayı keychain'e ekle
          echo "$CM_CERTIFICATE" | base64 --decode > /tmp/distribution.p12
          keychain add-certificates \
            --certificate /tmp/distribution.p12 \
            --certificate-password "$CM_CERTIFICATE_PASSWORD"
          echo "Certificate installed to keychain"

          # 3. Provisioning profile'ı yükle ve UUID'yi al
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          echo "$CM_PROVISIONING_PROFILE" | base64 --decode > /tmp/profile.mobileprovision

          # UUID'yi profil içinden çıkar
          PROFILE_UUID=$(security cms -D -i /tmp/profile.mobileprovision 2>/dev/null | plutil -extract UUID raw - 2>/dev/null)
          echo "Profile UUID: $PROFILE_UUID"

          cp /tmp/profile.mobileprovision "$PROFILES_DIR/${PROFILE_UUID}.mobileprovision"
          echo "Profile installed to: $PROFILES_DIR"

          # UUID'yi sonraki adımlar için sakla
          echo "PROFILE_UUID=$PROFILE_UUID" >> $CM_ENV

          # 4. Doğrulama
          security find-identity -v -p codesigning
          ls -la "$PROFILES_DIR/"

          # 5. Profil içeriği kontrol (Sign In with Apple var mı?)
          echo "=== PROFILE ENTITLEMENTS ==="
          security cms -D -i /tmp/profile.mobileprovision 2>/dev/null | plutil -p - | grep -A 20 "Entitlements"
          echo "=== Sign In with Apple check ==="
          security cms -D -i /tmp/profile.mobileprovision 2>/dev/null | grep -c "applesignin" && echo "HAS Sign In with Apple" || echo "NO Sign In with Apple"

      - name: Create export options
        script: |
          cat > /Users/builder/export_options.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>CM3BW9X6Z2</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.paramgo.app</key>
              <string>ParamGo AppStore</string>
            </dict>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST

      - name: Build iOS IPA
        script: |
          # UUID'yi /tmp/profile.mobileprovision'dan taze çıkar (CM_ENV'e bağımlı değil)
          PROFILE_UUID=$(security cms -D -i /tmp/profile.mobileprovision 2>/dev/null | plutil -extract UUID raw - 2>/dev/null)
          echo "Using provisioning profile UUID: $PROFILE_UUID"

          if [ -z "$PROFILE_UUID" ]; then
            echo "ERROR: Could not extract profile UUID!"
            exit 1
          fi

          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --export-options-plist /Users/builder/export_options.plist \
            --archive-flags="-destination 'generic/platform=iOS' DEVELOPMENT_TEAM='CM3BW9X6Z2' CODE_SIGN_IDENTITY='Apple Distribution' PROVISIONING_PROFILE='$PROFILE_UUID'"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
