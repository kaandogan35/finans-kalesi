workflows:
  ios-release:
    name: ParamGo iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    cache:
      cache_paths:
        - node_modules
        - $HOME/.npm
        - frontend/ios/App/SourcePackages
        - $HOME/Library/Developer/Xcode/DerivedData/CompilationCache.noindex
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'master'
          include: true
      cancel_previous_builds: true
    environment:
      groups:
        - default
      vars:
        XCODE_PROJECT: "frontend/ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.paramgo.app"
      node: v22.13.0
      xcode: latest
    scripts:
      - name: Install frontend dependencies
        script: |
          cd frontend
          npm install

      - name: Build frontend (Vite)
        script: |
          cd frontend
          npm run build

      - name: Capacitor sync iOS
        script: |
          cd frontend
          npx cap sync ios

      - name: Set App Icon (alpha removed)
        script: |
          ICON_SRC="frontend/resources/icon.png"
          ICON_DST="frontend/ios/App/App/Assets.xcassets/AppIcon.appiconset/AppIcon-512@2x.png"
          if [ -f "$ICON_SRC" ]; then
            cp "$ICON_SRC" "$ICON_DST"
            # Apple Store alpha kanal hatasi onlemi
            # JPEG uzerinden gecis — alpha kesin olarak kaldirilir
            sips -s format jpeg -s formatOptions best "$ICON_DST" --out /tmp/icon_noalpha.jpg
            sips -s format png /tmp/icon_noalpha.jpg --out "$ICON_DST"
            rm -f /tmp/icon_noalpha.jpg
            # Dogrulama
            echo "=== App Icon Dogrulama ==="
            sips -g hasAlpha -g pixelWidth -g pixelHeight "$ICON_DST"
            echo "App icon yerleştirildi (alpha kaldırıldı)."
          else
            echo "UYARI: frontend/resources/icon.png bulunamadı."
          fi

      - name: Place GoogleService-Info.plist
        script: |
          if [ -n "$GOOGLE_SERVICE_INFO_PLIST" ]; then
            echo "$GOOGLE_SERVICE_INFO_PLIST" | base64 --decode > frontend/ios/App/App/GoogleService-Info.plist
            echo "GoogleService-Info.plist yerleştirildi."
          else
            echo "UYARI: GOOGLE_SERVICE_INFO_PLIST env var bulunamadı."
          fi

      - name: Add Google Sign-In URL scheme to Info.plist
        script: |
          PLIST="frontend/ios/App/App/Info.plist"
          REVERSED_ID="com.googleusercontent.apps.505947540272-fuvn80vu0q2bjcgbihea1sm7b4jininv"
          if ! grep -q "$REVERSED_ID" "$PLIST"; then
            /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes array" "$PLIST" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0 dict" "$PLIST" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleTypeRole string Editor" "$PLIST" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes array" "$PLIST" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes:0 string $REVERSED_ID" "$PLIST"
            echo "Google URL scheme eklendi: $REVERSED_ID"
          else
            echo "Google URL scheme zaten mevcut."
          fi

      - name: Add Sign In with Apple entitlement
        script: |
          ENTITLEMENTS="frontend/ios/App/App/App.entitlements"
          # PlistBuddy ile sıfırdan oluştur (YAML-safe, heredoc yok)
          /usr/libexec/PlistBuddy -c "Clear dict" "$ENTITLEMENTS" 2>/dev/null || /usr/libexec/PlistBuddy -c "Save" "$ENTITLEMENTS"
          /usr/libexec/PlistBuddy -c "Add :com.apple.developer.applesignin array" "$ENTITLEMENTS"
          /usr/libexec/PlistBuddy -c "Add :com.apple.developer.applesignin:0 string Default" "$ENTITLEMENTS"
          echo "App.entitlements oluşturuldu (PlistBuddy ile)."
          # pbxproj'a entitlements referansı ekle
          PBXPROJ="frontend/ios/App/App.xcodeproj/project.pbxproj"
          if ! grep -q "App.entitlements" "$PBXPROJ"; then
            sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = com.paramgo.app;/PRODUCT_BUNDLE_IDENTIFIER = com.paramgo.app;\n\t\t\t\tCODE_SIGN_ENTITLEMENTS = App\/App.entitlements;/g' "$PBXPROJ"
            echo "pbxproj'a entitlements eklendi."
          else
            echo "Entitlements referansı zaten mevcut."
          fi

      - name: Increment build number
        script: |
          cd frontend/ios/App
          agvtool new-version -all $PROJECT_BUILD_NUMBER
          echo "Build number set to: $PROJECT_BUILD_NUMBER"

      - name: Set up code signing
        script: |
          # 1. Keychain oluştur
          keychain initialize

          # 2. API key base64 ise decode et (PEM formatına çevir)
          if ! echo "$APP_STORE_CONNECT_PRIVATE_KEY" | grep -q "BEGIN"; then
            echo "API key is base64, decoding to PEM..."
            export APP_STORE_CONNECT_PRIVATE_KEY="$(echo "$APP_STORE_CONNECT_PRIVATE_KEY" | base64 --decode)"
          fi
          echo "API key format check: $(echo "$APP_STORE_CONNECT_PRIVATE_KEY" | head -1)"

          # 3. CERTIFICATE_PRIVATE_KEY: CM_CERTIFICATE (.p12) içinden çıkar
          # Her build'de yeni key üretmek Apple 409 hatasına yol açıyor (sertifika limiti)
          if [ -z "$CERTIFICATE_PRIVATE_KEY" ]; then
            if [ -n "$CM_CERTIFICATE" ] && [ -n "$CM_CERTIFICATE_PASSWORD" ]; then
              echo "Extracting private key from CM_CERTIFICATE (.p12)..."
              echo "$CM_CERTIFICATE" | base64 --decode > /tmp/dist_cert.p12
              echo "P12 file size: $(wc -c < /tmp/dist_cert.p12) bytes"

              # OpenSSL 3.x'te .p12 (legacy şifreli) için -legacy flag gerekli
              EXTRACTED_KEY="$(openssl pkcs12 -legacy -in /tmp/dist_cert.p12 -nocerts -nodes -passin pass:"$CM_CERTIFICATE_PASSWORD" 2>/dev/null | sed -n '/-----BEGIN/,/-----END/p')"

              # -legacy çalışmadıysa (OpenSSL 1.x veya farklı format) standart dene
              if [ -z "$EXTRACTED_KEY" ]; then
                echo "Legacy mode failed, trying standard OpenSSL..."
                EXTRACTED_KEY="$(openssl pkcs12 -in /tmp/dist_cert.p12 -nocerts -nodes -passin pass:"$CM_CERTIFICATE_PASSWORD" 2>/dev/null | sed -n '/-----BEGIN/,/-----END/p')"
              fi

              if [ -n "$EXTRACTED_KEY" ]; then
                export CERTIFICATE_PRIVATE_KEY="$EXTRACTED_KEY"
                echo "Private key extracted successfully ($(echo "$EXTRACTED_KEY" | wc -l) lines)"
              else
                echo "ERROR: Private key extraction failed from .p12"
                echo "OpenSSL version: $(openssl version)"
                echo "Trying verbose output for diagnostics..."
                openssl pkcs12 -legacy -in /tmp/dist_cert.p12 -nocerts -nodes -passin pass:"$CM_CERTIFICATE_PASSWORD" -info 2>&1 | head -20 || true
                exit 1
              fi
            else
              echo "WARNING: CM_CERTIFICATE bulunamadı, yeni key üretiliyor (409 riski var)"
              openssl genrsa -out /tmp/cert_private_key.pem 2048 2>/dev/null
              export CERTIFICATE_PRIVATE_KEY="$(cat /tmp/cert_private_key.pem)"
            fi
          fi

          # 4. App Store Connect API ile sertifika ve profili indir/oluştur
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --platform IOS \
            --create

          # 5. Sertifikaları keychain'e ekle
          keychain add-certificates

          # 6. Xcode projesine imzalama ayarlarını uygula
          xcode-project use-profiles

          # 7. Xcode 26+ fallback: use-profiles project.pbxproj'u güncellemediyse manuel yaz
          PROFILE_FILE=$(ls "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles/"*.mobileprovision 2>/dev/null | head -1)
          [ -z "$PROFILE_FILE" ] && PROFILE_FILE=$(ls "$HOME/Library/MobileDevice/Provisioning Profiles/"*.mobileprovision 2>/dev/null | head -1)

          if [ -n "$PROFILE_FILE" ]; then
            PROFILE_NAME=$(security cms -D -i "$PROFILE_FILE" 2>/dev/null | /usr/libexec/PlistBuddy -c "Print :Name" /dev/stdin 2>/dev/null)
            echo "Bulunan profil: $PROFILE_NAME"
            PBXPROJ="${XCODE_PROJECT}/project.pbxproj"
            # CODE_SIGN_STYLE Automatic → Manual
            sed -i '' 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g' "$PBXPROJ"
            # PROVISIONING_PROFILE_SPECIFIER varsa güncelle, yoksa ekle
            if grep -q "PROVISIONING_PROFILE_SPECIFIER" "$PBXPROJ"; then
              sed -i '' "s/PROVISIONING_PROFILE_SPECIFIER = \"[^\"]*\"/PROVISIONING_PROFILE_SPECIFIER = \"$PROFILE_NAME\"/g" "$PBXPROJ"
            else
              sed -i '' "s/CODE_SIGN_STYLE = Manual;/CODE_SIGN_STYLE = Manual;\n\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = \"$PROFILE_NAME\";/g" "$PBXPROJ"
            fi
            echo "pbxproj güncellendi (Xcode 26 fallback)"
          else
            echo "HATA: Hiç provisioning profile bulunamadı!"
            exit 1
          fi

          # 8. Doğrulama
          echo "=== Profiles (old path) ==="
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles/" 2>/dev/null || echo "Empty"
          echo "=== Profiles (new path) ==="
          ls -la "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles/" 2>/dev/null || echo "Empty"
          echo "=== Code Signing Identities ==="
          security find-identity -v -p codesigning
          echo "=== pbxproj CODE_SIGN kontrol ==="
          grep -E "CODE_SIGN_STYLE|PROVISIONING_PROFILE_SPECIFIER|CODE_SIGN_IDENTITY" "${XCODE_PROJECT}/project.pbxproj" | head -10

      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
