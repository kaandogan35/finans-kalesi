workflows:
  ios-release:
    name: ParamGo iOS Release
    max_build_duration: 60
    environment:
      groups:
        - default
      vars:
        XCODE_PROJECT: "frontend/ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.paramgo.app"
      node: v22.13.0
      xcode: latest
    scripts:
      - name: Install frontend dependencies
        script: |
          cd frontend
          npm install

      - name: Build frontend (Vite)
        script: |
          cd frontend
          npm run build

      - name: Capacitor sync iOS
        script: |
          cd frontend
          npx cap add ios
          npx cap sync ios

      - name: Increment build number
        script: |
          cd frontend/ios/App
          agvtool new-version -all $PROJECT_BUILD_NUMBER
          echo "Build number set to: $PROJECT_BUILD_NUMBER"

      - name: Set up code signing
        script: |
          # 1. Keychain oluştur
          keychain initialize

          # 2. Sertifikayı keychain'e ekle
          echo "$CM_CERTIFICATE" | base64 --decode > /tmp/distribution.p12
          keychain add-certificates \
            --certificate /tmp/distribution.p12 \
            --certificate-password "$CM_CERTIFICATE_PASSWORD"
          echo "Certificate installed to keychain"

          # 3. Provisioning profile'ı yükle
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          echo "$CM_PROVISIONING_PROFILE" | base64 --decode > "$PROFILES_DIR/e205b272-0b9d-4d34-aa1c-754f7e6f5a3a.mobileprovision"
          echo "Profile installed to: $PROFILES_DIR"

          # 4. Doğrulama
          security find-identity -v -p codesigning
          ls -la "$PROFILES_DIR/"

      - name: Create export options
        script: |
          cat > /Users/builder/export_options.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>CM3BW9X6Z2</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.paramgo.app</key>
              <string>ParamGo AppStore</string>
            </dict>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST

      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --export-options-plist /Users/builder/export_options.plist \
            --archive-flags="-destination 'generic/platform=iOS' DEVELOPMENT_TEAM='CM3BW9X6Z2' CODE_SIGN_IDENTITY='Apple Distribution' 'PROVISIONING_PROFILE=e205b272-0b9d-4d34-aa1c-754f7e6f5a3a'"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
